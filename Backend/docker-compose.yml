services:
  booking-redis:
    image: redis:7.2.5-bookworm
    container_name: booking-redis
    command: >
      redis-server
      --requirepass "PROBooking##PROBooking##"
      --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data_booking:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "PROBooking##PROBooking##", "ping" ]
      interval: 5s
      retries: 5
    restart: always

  booking-mysql:
    image: mysql:8.0.36
    container_name: booking-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: Root@123
      MYSQL_DATABASE: bookingdb
      MYSQL_USER: booking
      MYSQL_PASSWORD: Booking123
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --bind-address=0.0.0.0
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - booking-network

  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin123
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - booking-network

volumes:
  redis_data_booking:
  mysql_data:
  rabbitmq_data:


networks:
  booking-network:
    driver: bridge