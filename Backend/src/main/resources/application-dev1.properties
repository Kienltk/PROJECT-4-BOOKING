spring.application.name=booking
server.port=8090

# Redis - Jedis
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=PROBooking##PROBooking##
spring.data.redis.database=1
spring.data.redis.timeout=5s
spring.data.redis.lettuce.pool.max-active=500
spring.data.redis.lettuce.pool.max-idle=100
spring.data.redis.lettuce.pool.min-idle=10
spring.data.redis.lettuce.pool.max-wait=60s

spring.datasource.url=jdbc:mysql://localhost:3306/bookingdb
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Ho_Chi_Minh

# Logging SQL
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql=TRACE
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.hibernate.event.internal.DefaultPersistEventListener=DEBUG
logging.level.org.hibernate.event.internal.DefaultSaveOrUpdateEventListener=DEBUG
spring.jpa.properties.hibernate.use_sql_comments=true

